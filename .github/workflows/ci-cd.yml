name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install dependencies
      run: npm install

    - name: Run SonarQube Scan
      uses: sonarsource/sonarqube-scan-action@v2
      with:
        host: ${{ http://localhost:9000 }}  # e.g., http://your-sonarqube-url:9000
        login: ${{ admin }}
        password: ${{ Devopsbuild@123 }}
        projectKey: devops-project

    - name: Build Docker image
      run: docker build -t $$   {{ secrets.DOCKER_USERNAME }}/hello-devops:   $${{ github.sha }} .

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{dpsh07 }}
        password: ${{ dckr_pat_golEoClnnhPWCP4NxcHHv5iiL6g }}

    - name: Push Docker image
      run: docker push $$   {{ secrets.DOCKER_USERNAME }}/hello-devops:   $${{ github.sha }}
